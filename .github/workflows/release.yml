name: Release

# Automatically cuts a GitHub Release when the version in Cargo.toml changes on
# main: the `check` job releases only if no tag exists for that version yet,
# then per-platform archives of the `gw` binary are cross-compiled and uploaded.
on:
  push:
    branches: [main]
    paths: ["Cargo.toml"]
  workflow_dispatch: # allow manual re-runs

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      release: ${{ steps.v.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full tag history for the existence check
      - id: v
        run: |
          version="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "v$version already released — skipping."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "v$version is new — releasing."
          fi

  create-release:
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag and release
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          generate_release_notes: true

  upload:
    needs: [check, create-release]
    permissions:
      contents: write # upload release assets
    strategy:
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest, name: linux-x64 }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest, name: linux-arm64 }
          - { target: x86_64-apple-darwin, os: macos-latest, name: darwin-x64 }
          - { target: aarch64-apple-darwin, os: macos-latest, name: darwin-arm64 }
          - { target: x86_64-pc-windows-msvc, os: windows-latest, name: windows-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Cross-compiles (via `cross` for the musl targets), archives the binary,
      # and uploads it to the release created above.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: gw
          target: ${{ matrix.target }}
          archive: gw-${{ matrix.name }}
          tar: unix
          zip: windows
          ref: refs/tags/v${{ needs.check.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
