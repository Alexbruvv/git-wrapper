name: Rust CI

# Builds and checks the Rust port during the v1 migration. Runs alongside the
# Bun CI until cutover, when the Bun toolchain is removed.
on:
  push:
    branches: [main, v1]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
